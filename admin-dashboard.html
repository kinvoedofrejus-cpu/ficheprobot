<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FicheProBot — Admin</title>
<link rel="manifest" href="admin-manifest.json">
<meta name="theme-color" content="#1B3E93">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FPB Admin">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F7FC; --bg-soft:#E9EFFC; --line:#DCE3F0; --ink:#1B2740; --ink-soft:#5B6B85;
    --blue:#2557C7; --blue-dark:#1B3E93; --orange:#F0932B; --orange-dark:#D97706;
    --card:#fff; --ok:#1D9A6C; --danger:#D14343;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 260px);
    color:var(--ink); font-family:'Inter',sans-serif; min-height:100vh; padding:20px 14px 60px;
  }
  .wrap{ max-width:900px; margin:0 auto; }
  .brand{ display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .brand img{ width:44px; height:44px; border-radius:11px; box-shadow:0 4px 14px rgba(37,87,199,.25); }
  .brand .name{ font-family:'Poppins',sans-serif; font-weight:800; font-size:19px; }
  .brand .name b{ color:var(--blue); }
  .brand .tag{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; }

  .loginwrap{ max-width:380px; margin:60px auto; }
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:14px; padding:22px;
    box-shadow:0 2px 12px rgba(27,39,64,.05); margin-bottom:16px;
  }
  .card h2{
    font-family:'Poppins',sans-serif; font-weight:700; font-size:13px; color:var(--blue);
    text-transform:uppercase; letter-spacing:.06em; margin:0 0 14px; padding-bottom:10px;
    border-bottom:1px solid var(--line);
  }
  .field{ margin-bottom:14px; }
  .field label{
    display:block; font-family:'Inter',sans-serif; font-weight:600; font-size:11px;
    text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); margin-bottom:6px;
  }
  .field input, .field select{
    width:100%; padding:11px; border:1.5px solid var(--line); border-radius:9px;
    font-family:'Inter',sans-serif; font-size:14.5px; box-sizing:border-box; background:#fff;
  }
  .field input:focus, .field select:focus{ outline:none; border-color:var(--blue); }
  button{
    background:linear-gradient(135deg, var(--blue), var(--blue-dark)); color:#fff; border:none;
    padding:12px 18px; border-radius:9px; font-family:'Poppins',sans-serif; font-weight:600;
    font-size:13.5px; cursor:pointer;
  }
  button:hover{ filter:brightness(1.05); }
  button.secondary{ background:#fff; color:var(--ink); border:1.5px solid var(--line); }
  button.danger{ background:linear-gradient(135deg, var(--danger), #a83232); }
  button.small{ padding:7px 12px; font-size:12px; }
  .err{ color:var(--danger); font-size:13px; margin-top:10px; }

  .tabs{ display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap; }
  .tabs button{ background:#fff; color:var(--ink-soft); border:1.5px solid var(--line); font-size:12.5px; padding:9px 14px; }
  .tabs button.active{ background:var(--blue); color:#fff; border-color:var(--blue); }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; font-family:'Inter',sans-serif; font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); padding:8px 6px; border-bottom:1.5px solid var(--line); }
  td{ padding:9px 6px; border-bottom:1px solid var(--line); vertical-align:middle; }
  .pill{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; }
  .pill.ok{ background:#E4F7EE; color:var(--ok); }
  .pill.danger{ background:#FBEAEA; color:var(--danger); }
  .pill.warn{ background:#FFF3E0; color:var(--orange-dark); }
  .statgrid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; }
  .statbox{ background:var(--bg-soft); border-radius:10px; padding:14px; text-align:center; }
  .statbox .num{ font-family:'Poppins',sans-serif; font-weight:800; font-size:24px; color:var(--blue); }
  .statbox .label{ font-size:11px; color:var(--ink-soft); margin-top:4px; }
  .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
  .empty{ text-align:center; color:var(--ink-soft); padding:30px 0; font-style:italic; font-size:13px; }
  .mono{ font-family:'IBM Plex Mono',monospace; }

  /* ---- Nouvelle architecture (en-tête + carte de compte + nav du bas) ---- */
  body{ padding-bottom:88px; }
  .apphead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .apphead .greet{ font-family:'Poppins',sans-serif; font-weight:700; font-size:17px; }
  .apphead .greet span{ color:var(--blue); }
  .apphead .sub{ font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
  .apphead .logout{ background:#fff; color:var(--ink-soft); border:1.5px solid var(--line); padding:8px 14px; font-size:12px; }

  .statcard{
    background:linear-gradient(135deg, var(--blue), var(--blue-dark)); color:#fff; border-radius:16px;
    padding:18px 20px; margin-bottom:18px; box-shadow:0 8px 20px rgba(37,87,199,.25);
  }
  .statcard .row{ display:flex; gap:22px; flex-wrap:wrap; }
  .statcard .item .num{ font-family:'Poppins',sans-serif; font-weight:800; font-size:26px; line-height:1; }
  .statcard .item .lbl{ font-size:11px; color:rgba(255,255,255,.85); margin-top:4px; }

  .bottomnav{
    position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line);
    display:flex; justify-content:space-around; padding:8px 4px 10px; z-index:20;
    box-shadow:0 -4px 16px rgba(27,39,64,.06);
  }
  .bottomnav button{
    background:none; border:none; color:var(--ink-soft); font-family:'Inter',sans-serif; font-weight:600;
    font-size:10.5px; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 8px; cursor:pointer;
  }
  .bottomnav button .ic{ font-size:19px; line-height:1; }
  .bottomnav button.active{ color:var(--blue); }

  .bulkbar{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap; background:var(--bg-soft);
    border:1.5px dashed var(--blue); border-radius:10px; padding:10px 12px; margin-bottom:14px;
  }
  .bulkbar select{ padding:8px; border:1.5px solid var(--line); border-radius:8px; font-size:13px; }
  .rowcheck{ width:16px; height:16px; }

  .promocard{
    border:1.5px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:12px;
    display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap;
  }
  .promocard.is-active{ border-color:var(--ok); background:#F3FBF7; }
  .promocard.is-upcoming{ border-color:var(--orange); background:#FFF8EF; }
  .promocard.is-ended{ opacity:.6; }
  .promobadge{ font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding:3px 8px; border-radius:20px; }
  .promobadge.active{ background:#E4F7EE; color:var(--ok); }
  .promobadge.upcoming{ background:#FFF3E0; color:var(--orange-dark); }
  .promobadge.ended{ background:#EEE; color:var(--ink-soft); }
</style>
</head>

const API = '/api';
const PLANS = [
  { label: '7 jours',   quota: 70 },
  { label: '30 jours',  quota: 270 },
  { label: '90 jours',  quota: 750 },
  { label: '270 jours', quota: 2500 }
];

let token = sessionStorage.getItem('fpb_admin_token') || null;
let currentTab = 'users';
let cache = { users: null, payments: null, stats: null, promos: null };

const app = document.getElementById('app');

function render(){
  if(!token){ renderLogin(); return; }
  renderDashboard();
}

function renderLogin(){
  app.innerHTML = `
    <div class="loginwrap">
      <div class="brand" style="justify-content:center;">
        <img src="${LOGO_SRC}" alt="FicheProBot">
        <div>
          <div class="name">Fiche<b>ProBot</b></div>
          <div class="tag">Espace administrateur</div>
        </div>
      </div>
      <div class="card">
        <h2>Connexion</h2>
        <div class="field">
          <label>Email</label>
          <input id="loginEmail" type="email" placeholder="ton@email.com">
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input id="loginPassword" type="password" placeholder="••••••••">
        </div>
        <button onclick="doLogin()" style="width:100%;">Se connecter</button>
        <div class="err" id="loginErr"></div>
      </div>
    </div>
  `;
}

async function doLogin(){
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const errBox = document.getElementById('loginErr');
  errBox.textContent = '';
  try{
    const res = await fetch(`${API}/admin-login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if(!res.ok || !data.token){
      errBox.textContent = data.error || 'Connexion refusée.';
      return;
    }
    token = data.token;
    sessionStorage.setItem('fpb_admin_token', token);
    render();
  } catch(e){
    errBox.textContent = 'Impossible de contacter le serveur.';
  }
}

function logout(){
  token = null;
  sessionStorage.removeItem('fpb_admin_token');
  cache = { users:null, payments:null, stats:null, promos:null };
  render();
}

function renderDashboard(){
  app.innerHTML = `
    <div class="apphead">
      <div class="brand" style="margin-bottom:0;">
        <img src="${LOGO_SRC}" alt="FicheProBot">
        <div>
          <div class="greet">Bonjour, <span>Admin</span></div>
          <div class="sub">Espace administrateur — FicheProBot</div>
        </div>
      </div>
      <button class="logout" onclick="logout()">Déconnexion</button>
    </div>
    <div id="headerStat"></div>
    <div id="tabContent"><div class="empty">Chargement…</div></div>
    <div class="bottomnav">
      <button class="${currentTab==='users'?'active':''}" onclick="switchTab('users')"><span class="ic">👤</span>Utilisateurs</button>
      <button class="${currentTab==='generate'?'active':''}" onclick="switchTab('generate')"><span class="ic">🔑</span>Générer</button>
      <button class="${currentTab==='payments'?'active':''}" onclick="switchTab('payments')"><span class="ic">💳</span>Paiements</button>
      <button class="${currentTab==='stats'?'active':''}" onclick="switchTab('stats')"><span class="ic">📊</span>Stats</button>
      <button class="${currentTab==='promo'?'active':''}" onclick="switchTab('promo')"><span class="ic">🎁</span>Promos</button>
    </div>
  `;
  loadHeaderStat();
  loadTab();
}

async function loadHeaderStat(){
  const box = document.getElementById('headerStat');
  if(!box) return;
  try{
    const s = await apiPost('admin-stats', {});
    cache.stats = s;
    box.innerHTML = `
      <div class="statcard">
        <div class="row">
          <div class="item"><div class="num">${s.activeSubs}</div><div class="lbl">Abonnements actifs</div></div>
          <div class="item"><div class="num">${s.totalUsers}</div><div class="lbl">Utilisateurs</div></div>
          <div class="item"><div class="num">${(s.totalRevenue||0).toLocaleString('fr-FR')}</div><div class="lbl">FCFA encaissés</div></div>
        </div>
      </div>
    `;
  } catch(e){ box.innerHTML = ''; }
}

function switchTab(tab){
  currentTab = tab;
  renderDashboard();
}

async function apiPost(path, body){
  const res = await fetch(`${API}/${path}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ token, ...body })
  });
  if(res.status === 401){ logout(); throw new Error('Session expirée'); }
  const data = await res.json();
  if(!res.ok) throw new Error(data.error || 'Erreur serveur');
  return data;
}

async function loadTab(){
  const box = document.getElementById('tabContent');
  try{
    if(currentTab === 'users') return renderUsersTab(box);
    if(currentTab === 'generate') return renderGenerateTab(box);
    if(currentTab === 'payments') return renderPaymentsTab(box);
    if(currentTab === 'stats') return renderStatsTab(box);
    if(currentTab === 'promo') return renderPromoTab(box);
  } catch(e){
    box.innerHTML = `<div class="card"><p class="err">${e.message}</p></div>`;
  }
}

/* ---------- Utilisateurs ---------- */
let userSearchTerm = '';
let selectedPhones = new Set();

async function renderUsersTab(box){
  box.innerHTML = `<div class="empty">Chargement des utilisateurs…</div>`;
  const data = await apiPost('admin-list-users', {});
  cache.users = data.users;
  renderUsersTable(box);
}

function renderUsersTable(box){
  const now = Date.now();
  const term = userSearchTerm.trim().toLowerCase();
  const filtered = !term ? cache.users : cache.users.filter(u => {
    const fullName = `${u.prenom||''} ${u.nom||''}`.toLowerCase();
    return fullName.includes(term) || (u.phone||'').includes(term);
  });

  const rows = filtered.map(u => {
    const expired = u.expiryTs <= now;
    const statusPill = !u.active
      ? `<span class="pill danger">Désactivé</span>`
      : expired ? `<span class="pill warn">Expiré</span>` : `<span class="pill ok">Actif</span>`;
    return `
      <tr>
        <td><input type="checkbox" class="rowcheck" ${selectedPhones.has(u.phone)?'checked':''} onchange="toggleSelectOne('${u.phone}', this.checked)"></td>
        <td>${u.prenom || ''} ${u.nom || ''}</td>
        <td class="mono">${u.phone}</td>
        <td>${u.planLabel || '—'}</td>
        <td>${u.classe === 'ce1-cm2' ? 'CE1-CM2' : (u.classe === 'ci-cp' ? 'CI-CP' : '—')}</td>
        <td class="mono">${u.quotaUsed||0}/${u.quotaTotal||0}</td>
        <td>${new Date(u.expiryTs).toLocaleDateString('fr-FR')}</td>
        <td>${statusPill}</td>
        <td class="mono" style="font-size:12px;">${u.code}</td>
        <td>
          <div style="display:flex; gap:6px; flex-wrap:wrap;">
            <button class="small secondary" onclick="assignPlanTo('${u.phone}', '${escapeAttr(u.nom)}', '${escapeAttr(u.prenom)}', '${u.classe||''}')">Attribuer abonnement</button>
            <button class="small secondary" onclick="editPhone('${u.phone}')">Modifier n°</button>
            <button class="small secondary" onclick="editName('${u.phone}', '${escapeAttr(u.nom)}', '${escapeAttr(u.prenom)}')">Modifier nom</button>
            <button class="small secondary" onclick="toggleActive('${u.phone}', ${!u.active})">${u.active ? 'Désactiver' : 'Activer'}</button>
            <button class="small secondary" onclick="resetCode('${u.phone}')">Réinit. code</button>
            <button class="small danger" onclick="deleteUser('${u.phone}', '${escapeAttr(u.nom)}', '${escapeAttr(u.prenom)}')">Supprimer</button>
          </div>
        </td>
      </tr>
    `;
  }).join('');

  const allChecked = filtered.length > 0 && filtered.every(u => selectedPhones.has(u.phone));
  const planOptionsBulk = PLANS.map((p,i)=>`<option value="${i}">${p.label} (${p.quota} fiches)</option>`).join('');

  box.innerHTML = `
    <div class="card">
      <h2>Utilisateurs (${filtered.length}${term ? ' / ' + cache.users.length : ''})</h2>
      <div class="field" style="margin-bottom:16px;">
        <label>Rechercher par nom ou numéro</label>
        <div style="display:flex; gap:8px;">
          <input id="userSearchInput" value="${escapeAttr(userSearchTerm)}" placeholder="Ex: Kinvo ou 0197001234" onkeydown="if(event.key==='Enter') runUserSearch();" style="flex:1;">
          <button onclick="runUserSearch()" style="white-space:nowrap;">🔍 Rechercher</button>
        </div>
      </div>
      ${selectedPhones.size > 0 ? `
        <div class="bulkbar">
          <b style="font-size:13px;">${selectedPhones.size} sélectionné(s)</b>
          <select id="bulkPlan">${planOptionsBulk}</select>
          <button onclick="bulkAssign()">Attribuer cette formule à la sélection</button>
          <button class="secondary" onclick="selectedPhones.clear(); renderUsersTable(document.getElementById('tabContent'));">Tout désélectionner</button>
        </div>
      ` : ''}
      ${filtered.length ? `
        <div style="overflow-x:auto;">
        <table>
          <tr>
            <th><input type="checkbox" class="rowcheck" ${allChecked?'checked':''} onchange="toggleSelectAll(this.checked)"></th>
            <th>Nom</th><th>Téléphone</th><th>Plan</th><th>Classe</th><th>Fiches</th><th>Expire le</th><th>Statut</th><th>Code</th><th>Actions</th>
          </tr>
          ${rows}
        </table>
        </div>
      ` : `<div class="empty">${term ? 'Aucun utilisateur ne correspond à cette recherche.' : "Aucun utilisateur pour l'instant. Génère un premier code depuis l'onglet Générer un code."}</div>`}
    </div>
  `;
}

function toggleSelectOne(phone, checked){
  if(checked) selectedPhones.add(phone); else selectedPhones.delete(phone);
  renderUsersTable(document.getElementById('tabContent'));
}
function toggleSelectAll(checked){
  const term = userSearchTerm.trim().toLowerCase();
  const filtered = !term ? cache.users : cache.users.filter(u => {
    const fullName = `${u.prenom||''} ${u.nom||''}`.toLowerCase();
    return fullName.includes(term) || (u.phone||'').includes(term);
  });
  filtered.forEach(u => checked ? selectedPhones.add(u.phone) : selectedPhones.delete(u.phone));
  renderUsersTable(document.getElementById('tabContent'));
}
async function bulkAssign(){
  const planIndex = parseInt(document.getElementById('bulkPlan').value, 10);
  const plan = PLANS[planIndex];
  const phones = [...selectedPhones];
  if(!confirm(`Attribuer la formule "${plan.label}" à ${phones.length} utilisateur(s) sélectionné(s) ? Leur code d'accès actuel reste inchangé.`)) return;
  try{
    const data = await apiPost('admin-bulk-assign', { phones, planIndex });
    alert(`✓ ${data.updated} compte(s) mis à jour vers "${data.planLabel}".${data.failed.length ? ' ' + data.failed.length + ' introuvable(s).' : ''}`);
    selectedPhones.clear();
    loadTab();
    loadHeaderStat();
  } catch(e){
    alert(e.message);
  }
}

function runUserSearch(){
  const input = document.getElementById('userSearchInput');
  userSearchTerm = input ? input.value : '';
  renderUsersTable(document.getElementById('tabContent'));
}

function escapeAttr(s){
  return (s||'').replace(/'/g, "\\'");
}
function escapeHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function toggleActive(phone, active){
  await apiPost('admin-set-active', { phone, active });
  loadTab();
}
async function deleteUser(phone, nom, prenom){
  const label = `${prenom || ''} ${nom || ''}`.trim() || phone;
  if(!confirm(`Supprimer définitivement le compte de ${label} (${phone}) ?\nCette action est irréversible : le code d'accès et l'historique du compte seront perdus.`)) return;
  try{
    await apiPost('admin-delete-user', { phone });
    alert('Compte supprimé.');
    loadTab();
    loadHeaderStat();
  } catch(e){
    alert(e.message);
  }
}
async function resetCode(phone){
  if(!confirm("Générer un nouveau code pour cet utilisateur ? L'ancien code cessera de fonctionner. Le nombre de fiches déjà utilisées ne sera pas remis à zéro.")) return;
  const data = await apiPost('admin-reset-code', { phone });
  alert('Nouveau code : ' + data.code);
  loadTab();
}
async function editPhone(oldPhone){
  const newPhone = prompt('Nouveau numéro de téléphone pour ce compte :', oldPhone);
  if(!newPhone || newPhone.trim() === oldPhone) return;
  try{
    await apiPost('admin-update-phone', { oldPhone, newPhone: newPhone.trim() });
    alert('Numéro mis à jour.');
    loadTab();
  } catch(e){
    alert(e.message);
  }
}
async function editName(phone, currentNom, currentPrenom){
  const nom = prompt('Nom :', currentNom || '');
  if(nom === null) return;
  const prenom = prompt('Prénom :', currentPrenom || '');
  if(prenom === null) return;
  try{
    await apiPost('admin-update-profile', { phone, nom, prenom });
    alert('Nom mis à jour.');
    loadTab();
  } catch(e){
    alert(e.message);
  }
}
function assignPlanTo(phone, nom, prenom, classe){
  genPrefill = { phone, nom, prenom, classe: classe || '' };
  switchTab('generate');
}

/* ---------- Générer un code / Attribuer un abonnement ---------- */
let genPrefill = null;
function renderGenerateTab(box){
  const planOptions = PLANS.map((p,i)=>`<option value="${i}">${p.label} (${p.quota} fiches)</option>`).join('');
  const pre = genPrefill || { nom:'', prenom:'', phone:'', classe:'' };
  box.innerHTML = `
    <div class="card">
      <h2>${genPrefill ? 'Attribuer un abonnement' : 'Générer un code pour un client'}</h2>
      ${genPrefill ? `<p style="font-size:12.5px; color:var(--ink-soft); margin:0 0 14px;">Choisis la nouvelle formule pour ce compte existant — un nouveau code sera généré.</p>` : ''}
      <div class="field"><label>Nom</label><input id="genNom" value="${pre.nom}" placeholder="Ex: Kinvo"></div>
      <div class="field"><label>Prénom</label><input id="genPrenom" value="${pre.prenom}" placeholder="Ex: Sévérin"></div>
      <div class="field"><label>Téléphone</label><input id="genPhone" value="${pre.phone}" placeholder="Ex: 0197001234"></div>
      <div class="field"><label>Durée</label><select id="genPlan">${planOptions}</select></div>
      <div class="field">
        <label>Classe</label>
        <select id="genClasse">
          <option value="ci-cp" ${pre.classe==='ci-cp'?'selected':''}>CI-CP</option>
          <option value="ce1-cm2" ${pre.classe==='ce1-cm2'?'selected':''}>CE1-CM2</option>
        </select>
      </div>
      <p style="font-size:12px; color:var(--ink-soft); margin:-6px 0 14px;">L'utilisateur ne pourra faire des fiches que pour la classe choisie ici.</p>
      <button onclick="doGenerate()" style="width:100%;">${genPrefill ? 'Attribuer et générer le code' : 'Générer le code'}</button>
      ${genPrefill ? `<button class="secondary" style="width:100%; margin-top:8px;" onclick="genPrefill=null; renderGenerateTab(document.getElementById('tabContent'));">Annuler / nouveau client</button>` : ''}
      <div id="genResult" style="margin-top:16px;"></div>
    </div>
  `;
}

async function doGenerate(){
  const nom = document.getElementById('genNom').value;
  const prenom = document.getElementById('genPrenom').value;
  const phone = document.getElementById('genPhone').value;
  const planIndex = parseInt(document.getElementById('genPlan').value, 10);
  const classe = document.getElementById('genClasse').value;
  const resultBox = document.getElementById('genResult');
  resultBox.innerHTML = '';
  try{
    const data = await apiPost('admin-generate-code', { nom, prenom, phone, planIndex, classe });
    const classeLabel = data.classe === 'ce1-cm2' ? 'CE1-CM2' : 'CI-CP';
    resultBox.innerHTML = `
      <div style="background:var(--bg-soft); border:1.5px dashed var(--line); border-radius:9px; padding:14px; text-align:center;">
        <div style="font-size:12px; color:var(--ink-soft); margin-bottom:6px;">Code généré — ${data.planLabel} · ${classeLabel}, expire le ${new Date(data.expiryTs).toLocaleDateString('fr-FR')}</div>
        <div class="mono" style="font-size:22px; font-weight:700;">${data.code}</div>
      </div>
    `;
    genPrefill = null;
  } catch(e){
    resultBox.innerHTML = `<p class="err">${e.message}</p>`;
  }
}

/* ---------- Paiements ---------- */
async function renderPaymentsTab(box){
  box.innerHTML = `<div class="empty">Chargement des paiements…</div>`;
  const data = await apiPost('admin-payments', {});
  const rows = data.payments.map(p => `
    <tr>
      <td>${new Date(p.paidAt || p.createdAt).toLocaleString('fr-FR')}</td>
      <td>${p.nom||''} ${p.prenom||''}</td>
      <td class="mono">${p.phone||'—'}</td>
      <td class="mono">${(p.amount||0).toLocaleString('fr-FR')} FCFA</td>
      <td><span class="pill ${p.status==='paid'?'ok':'danger'}">${p.status}</span></td>
      <td>${p.source === 'manuel' ? 'Manuel (WhatsApp)' : 'FedaPay'}</td>
    </tr>
  `).join('');

  box.innerHTML = `
    <div class="card">
      <h2>Paiements (${data.payments.length})</h2>
      ${data.payments.length ? `
        <div style="overflow-x:auto;">
        <table>
          <tr><th>Date</th><th>Client</th><th>Téléphone</th><th>Montant</th><th>Statut</th><th>Source</th></tr>
          ${rows}
        </table>
        </div>
      ` : `<div class="empty">Aucun paiement enregistré pour l'instant.</div>`}
    </div>
  `;
}

/* ---------- Statistiques ---------- */
async function renderStatsTab(box){
  box.innerHTML = `<div class="empty">Calcul des statistiques…</div>`;
  const s = await apiPost('admin-stats', {});
  const perPlanRows = s.perPlan.map(p => `<tr><td>${p.label}</td><td class="mono">${p.count}</td></tr>`).join('');

  box.innerHTML = `
    <div class="card">
      <h2>Vue d'ensemble</h2>
      <div class="statgrid">
        <div class="statbox"><div class="num">${s.totalUsers}</div><div class="label">Utilisateurs</div></div>
        <div class="statbox"><div class="num">${s.activeSubs}</div><div class="label">Abonnements actifs</div></div>
        <div class="statbox"><div class="num">${s.expiredSubs}</div><div class="label">Expirés</div></div>
        <div class="statbox"><div class="num">${s.disabledAccounts}</div><div class="label">Désactivés</div></div>
        <div class="statbox"><div class="num">${s.quotaUsedTotal}</div><div class="label">Fiches utilisées (total)</div></div>
        <div class="statbox"><div class="num">${s.totalRevenue.toLocaleString('fr-FR')}</div><div class="label">FCFA encaissés (${s.paidCount} paiements)</div></div>
      </div>
    </div>
    <div class="card">
      <h2>Répartition par plan</h2>
      <table>
        <tr><th>Plan</th><th>Nombre d'utilisateurs</th></tr>
        ${perPlanRows}
      </table>
    </div>
  `;
}

/* ---------- Promotions ---------- */
let showAddPromoForm = false;

function promoStatusOf(p, now){
  if(p.enabled === false) return 'ended';
  if(p.startAt > now) return 'upcoming';
  if(p.endAt && p.endAt <= now) return 'ended';
  return 'active';
}

async function renderPromoTab(box){
  box.innerHTML = `<div class="empty">Chargement…</div>`;
  const data = await apiPost('admin-list-promos', {});
  cache.promos = data.promos || [];
  renderPromoList(box);
}

function renderPromoList(box){
  const now = Date.now();
  const list = [...cache.promos].sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
  const planOptions = PLANS.map((p,i)=>`<option value="${i}">${p.label} (${p.quota} fiches)</option>`).join('');

  const cards = list.map(p => {
    const status = promoStatusOf(p, now);
    const plan = PLANS[p.planIndex];
    const labels = { active:'En cours', upcoming:'À venir', ended:'Terminée' };
    return `
      <div class="promocard is-${status}">
        <div>
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
            <span class="promobadge ${status}">${labels[status]}</span>
            <b>${plan ? plan.label : '?'}</b>
          </div>
          <div style="font-size:12.5px; color:var(--ink-soft);">
            Début : ${new Date(p.startAt).toLocaleString('fr-FR')}${p.endAt ? ' · Fin : ' + new Date(p.endAt).toLocaleString('fr-FR') : ' · sans date de fin'}
          </div>
          ${p.message ? `<div style="font-size:13px; margin-top:6px;">🎁 ${escapeHtml(p.message)}</div>` : ''}
        </div>
        <button class="small danger" onclick="deletePromo('${p.id}')">Supprimer</button>
      </div>
    `;
  }).join('');

  box.innerHTML = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:${showAddPromoForm ? '14px':'0'};">
        <h2 style="margin:0; border:none; padding:0;">Promotions</h2>
        <button onclick="toggleAddPromoForm()">${showAddPromoForm ? '✕ Annuler' : '+ Ajouter une promotion'}</button>
      </div>
      ${showAddPromoForm ? `
        <div style="border-top:1px solid var(--line); margin-top:14px; padding-top:14px;">
          <p style="font-size:12px; color:var(--ink-soft); margin:0 0 14px;">Choisis la formule à offrir, une date de début (la promo démarre automatiquement à cette date), et éventuellement une date de fin.</p>
          <div class="field"><label>Formule à mettre en promotion</label><select id="newPromoPlan">${planOptions}</select></div>
          <div class="field"><label>Début de la promotion</label><input type="datetime-local" id="newPromoStart"></div>
          <div class="field"><label>Fin de la promotion (optionnel)</label><input type="datetime-local" id="newPromoEnd"></div>
          <div class="field"><label>Message affiché aux utilisateurs (optionnel)</label><input id="newPromoMessage" placeholder="Ex: Offre de lancement — abonnement 30 jours offert !"></div>
          <button onclick="createPromo()" style="width:100%;">🎁 Programmer cette promotion</button>
          <div id="promoMsg" style="margin-top:12px; font-size:12.5px;"></div>
        </div>
      ` : ''}
    </div>
    <div class="card">
      <h2>Historique et promotions programmées</h2>
      ${cards || `<div class="empty">Aucune promotion pour l'instant.</div>`}
    </div>
  `;

  if(showAddPromoForm){
    const startInput = document.getElementById('newPromoStart');
    if(startInput){
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      startInput.value = d.toISOString().slice(0,16);
    }
  }
}

function toggleAddPromoForm(){
  showAddPromoForm = !showAddPromoForm;
  renderPromoList(document.getElementById('tabContent'));
}

async function createPromo(){
  const planIndex = parseInt(document.getElementById('newPromoPlan').value, 10);
  const startVal = document.getElementById('newPromoStart').value;
  const endVal = document.getElementById('newPromoEnd').value;
  const message = document.getElementById('newPromoMessage').value;
  const msgBox = document.getElementById('promoMsg');
  if(!startVal){ msgBox.style.color='var(--danger)'; msgBox.textContent='Choisis une date de début.'; return; }
  const startAt = new Date(startVal).getTime();
  const endAt = endVal ? new Date(endVal).getTime() : null;
  try{
    const data = await apiPost('admin-add-promo', { planIndex, startAt, endAt, message });
    msgBox.style.color = 'var(--ok)';
    msgBox.textContent = data.grantedCount
      ? `Promotion programmée ✓ — ${data.grantedCount} abonné(s) actif(s) ont déjà reçu le bonus.`
      : 'Promotion programmée ✓';
    showAddPromoForm = false;
    loadTab();
  } catch(e){
    msgBox.style.color = 'var(--danger)';
    msgBox.textContent = e.message;
  }
}

async function deletePromo(id){
  if(!confirm('Supprimer cette promotion ?')) return;
  await apiPost('admin-delete-promo', { id });
  loadTab();
}

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./admin-service-worker.js').catch(() => {});
  });
}
</script>
</body>
</html>
