<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FicheProBot</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2557C7">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FicheProBot">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root{
    --bg: #F4F7FC;
    --bg-soft: #E9EFFC;
    --line: #DCE3F0;
    --ink: #1B2740;
    --ink-soft: #5B6B85;
    --blue: #2557C7;
    --blue-dark: #1B3E93;
    --orange: #F0932B;
    --orange-dark: #D97706;
    --card: #FFFFFF;
    --ok: #1D9A6C;
    --danger: #D14343;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 320px);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    padding-bottom: 92px;
  }

  /* Bandeau + navigation persistants, immobiles en haut */
  .appheader{
    position: sticky; top: 0; z-index: 600;
  }
  .topbanner{
    margin: -28px -18px 0; padding: 18px 18px 16px;
    background: linear-gradient(135deg, var(--blue), var(--blue-dark));
    display:flex; align-items:center; gap:12px;
  }
  .topbanner img{ width:42px; height:42px; border-radius:10px; flex-shrink:0; object-fit:cover; }
  .topbanner .name{ font-family:'Poppins', sans-serif; font-weight:800; font-size:20px; color:#fff; letter-spacing:.03em; }
  .navbar{
    display:flex; margin: 0 -18px 24px; background:#fff;
    border-bottom:1px solid var(--line); box-shadow:0 2px 8px rgba(27,39,64,.05);
  }
  .navbar button{
    flex:1; border:none; background:none; cursor:pointer;
    padding:11px 4px 9px; font-family:'Poppins', sans-serif; font-weight:600; font-size:10.5px;
    color:var(--ink-soft); display:flex; flex-direction:column; align-items:center; gap:3px;
    border-bottom:3px solid transparent;
  }
  .navbar button .ic{ font-size:17px; }
  .navbar button.active{ color:var(--blue); border-bottom-color:var(--blue); }

  /* Barre d'icônes fixe tout en bas */
  .bottomicons{
    position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line);
    display:flex; justify-content:space-around; align-items:center;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom)); z-index:500;
    box-shadow:0 -4px 14px rgba(27,39,64,.06);
  }
  .bottomicons > *{ color:inherit; text-decoration:none; text-align:center; cursor:pointer; }
  .bottomicons .ic{ font-size:19px; }
  .bottomicons .lbl{ font-size:9.5px; font-weight:600; color:var(--ink-soft); margin-top:3px; }
  h1,h2,h3{ font-family:'Poppins', sans-serif; margin:0; }
  .mono{ font-family:'IBM Plex Mono', monospace; letter-spacing:.02em; }
  .app{ max-width: 900px; margin:0 auto; padding: 28px 18px 60px; }

  /* Header */
  .masthead{
    display:flex; align-items:flex-end; justify-content:space-between;
    border-bottom: none;
    padding-bottom: 14px; margin-bottom: 26px;
  }
  .brandrow{ display:flex; align-items:center; gap:12px; }
  .brandlogo{ width:50px; height:50px; border-radius:12px; object-fit:cover; flex-shrink:0; box-shadow:0 4px 14px rgba(37,87,199,.25); }
  .masthead .eyebrow{
    font-family:'Poppins', sans-serif; font-weight:700; font-size:12px; letter-spacing:.08em;
    text-transform:uppercase; color: var(--blue); margin-bottom:4px; display:block;
  }
  .masthead h1{ font-size: 28px; font-weight:700; color: var(--ink); }
  .masthead h1 em{ font-style: normal; color: var(--orange); }
  .newbtn{
    background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color:#fff; border:none; padding: 12px 20px;
    font-family:'Poppins', sans-serif; font-weight:600; font-size: 13.5px; letter-spacing:.01em;
    cursor:pointer; border-radius: 8px; white-space:nowrap; box-shadow:0 6px 16px rgba(37,87,199,.28);
  }
  .newbtn:hover{ filter:brightness(1.06); }

  /* Dashboard list */
  .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap:16px; }
  .fichecard{
    background: var(--card); border:1px solid var(--line); border-radius:12px;
    padding: 16px; position:relative; overflow:hidden;
    box-shadow: 0 2px 10px rgba(27,39,64,0.05);
  }
  .fichecard .stamp{
    position:absolute; top:10px; right:10px; width:52px; height:52px;
    border:2px solid var(--orange); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    transform: rotate(-14deg); opacity:.5;
  }
  .fichecard .stamp span{
    font-family:'IBM Plex Mono', monospace; font-size:8px; color:var(--orange-dark);
    text-align:center; line-height:1.15; letter-spacing:.03em; text-transform:uppercase;
  }
  .fichecard .matiere{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--blue); font-weight:700; font-family:'Poppins',sans-serif; }
  .fichecard h3{ font-size:18px; margin:6px 0 4px; padding-right:50px; font-weight:600; }
  .fichecard .meta{ font-size:12.5px; color:var(--ink-soft); margin-bottom:14px; }
  .fichecard .row{ display:flex; gap:8px; flex-wrap:wrap; }
  .fichecard button{
    background:#fff; border:1.5px solid var(--line); color:var(--ink);
    font-family:'Inter', sans-serif; font-weight:600; font-size:12px; padding:7px 12px;
    border-radius:7px; cursor:pointer;
  }
  .fichecard button.primary{ background:var(--blue); border-color:var(--blue); color:#fff; }
  .fichecard button.danger{ border-color:var(--danger); color:var(--danger); }
  .empty{
    border: 1.5px dashed var(--line); border-radius:12px; padding: 48px 20px;
    text-align:center; color: var(--ink-soft); background:var(--card);
  }
  .empty .big{ font-family:'Poppins',sans-serif; font-weight:600; font-size:19px; color:var(--ink); margin-bottom:8px; display:block;}

  /* Form */
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; gap:10px; flex-wrap:wrap;}
  .backlink{ font-family:'Poppins', sans-serif; font-weight:700; font-size:13.5px; color:var(--blue); background:#fff; border:1.5px solid var(--blue); cursor:pointer; padding:9px 16px; border-radius:8px; display:inline-flex; align-items:center; gap:6px;}
  .backlink:hover{ background:var(--bg-soft); }
  .backlink:hover{ color:var(--blue); }
  .actions{ display:flex; gap:8px; align-items:center; }
  .actions button{
    font-family:'Poppins', sans-serif; font-weight:600; font-size:12.5px; padding:10px 16px;
    border-radius:8px; cursor:pointer; border:1.5px solid var(--line); background:#fff; color:var(--ink);
  }
  .actions button.primary{ background:var(--blue); border-color:var(--blue); color:#fff; }
  .actions button.pdf{ background:linear-gradient(135deg, var(--orange), var(--orange-dark)); border-color:var(--orange-dark); color:#fff; }
  .savedmsg{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ok); }

  .panel{
    background: var(--card); border:1px solid var(--line); border-radius:12px;
    padding: 20px; margin-bottom: 18px; box-shadow:0 2px 10px rgba(27,39,64,0.04);
  }
  .panel h2{
    font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--blue); font-weight:700;
    font-family:'Poppins', sans-serif; margin-bottom:16px; padding-bottom:10px;
    border-bottom:1px solid var(--line);
  }
  .fieldgrid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(190px,1fr)); gap:14px; }
  .field{ display:flex; flex-direction:column; }
  .field.full{ grid-column: 1/-1; }
  .field label{
    font-family:'Inter', sans-serif; font-weight:600; font-size:11px; text-transform:uppercase;
    letter-spacing:.05em; color:var(--ink-soft); margin-bottom:5px;
  }
  .field input, .field textarea{
    font-family:'Inter', sans-serif; font-size:14.5px; color:var(--ink);
    border:none; border-bottom:1.5px solid var(--line); background:transparent;
    padding:7px 2px; outline:none;
  }
  .field input:focus, .field textarea:focus{ border-color:var(--blue); }
  .field textarea{ resize:vertical; min-height:46px; font-family:inherit; }

  .phase{ margin-bottom: 22px; }
  .phase > h2{
    font-family:'Poppins',sans-serif; font-size:19px; font-weight:700; color:var(--ink);
    text-transform:none; letter-spacing:0; border-bottom:2px solid var(--blue); padding-bottom:8px;
    margin-bottom:16px;
  }
  .subsection{
    border:1px solid var(--line); border-radius:10px; margin-bottom:12px; overflow:hidden; background:var(--card);
  }
  .subsection .label{
    background: var(--bg-soft); font-family:'Inter',sans-serif; font-weight:700; font-size:12px;
    text-transform:uppercase; letter-spacing:.04em; padding:8px 12px; color:var(--blue-dark);
  }
  .subsection .cols{ display:grid; grid-template-columns: 1fr 1fr; }
  .subsection .col{ padding:10px 12px; }
  .subsection .col:first-child{ border-right:1px solid var(--line); }
  .subsection .colhead{ font-size:10.5px; color:var(--ink-soft); font-family:'Inter',sans-serif; font-weight:600; margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em;}
  .subsection textarea{
    width:100%; border:none; background:transparent; font-family:'Inter',sans-serif;
    font-size:14px; resize:vertical; min-height:64px; outline:none;
  }
  @media (max-width: 640px){
    .subsection .cols{ grid-template-columns: 1fr; }
    .subsection .col:first-child{ border-right:none; border-bottom:1px solid var(--line); }
  }

  /* Subscription / paywall */
  .plans{ display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap:12px; margin-bottom:18px; }
  .plancard{
    border:2px solid var(--line); border-radius:10px; padding:14px; text-align:center; cursor:pointer; background:#fff;
  }
  .plancard.selected{ border-color:var(--blue); background:var(--bg-soft); }
  .plancard .days{ font-family:'Poppins',sans-serif; font-weight:700; font-size:16px; color:var(--ink); }
  .plancard .price{ font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--orange-dark); margin-top:4px; }
  .whatsappbtn{
    display:inline-flex; align-items:center; gap:8px; background:#25D366; color:#fff; border:none;
    padding:13px 20px; border-radius:9px; font-family:'Poppins',sans-serif; font-weight:600; font-size:14px;
    cursor:pointer; text-decoration:none;
  }
  .whatsappbtn:hover{ filter:brightness(1.05); }
  .momobox{
    background: var(--bg-soft); border:1.5px dashed var(--blue); border-radius:10px; padding:14px 16px; margin-bottom:18px;
  }
  .momobox .num{ font-family:'IBM Plex Mono',monospace; font-size:17px; font-weight:600; color:var(--blue-dark); }

  /* Print / PDF template */
  #pdf-root{ position:fixed; left:-9999px; top:0; width:760px; background:#fff; color:#111; }
  .pdfpage{ padding: 26px; font-family: Georgia, 'Times New Roman', serif; font-size:13px; line-height:1.5; -webkit-font-smoothing: antialiased; }
  .pdfpage .frame{ border: 2.5px solid #111; padding: 12px; }
  .pdfpage .toprow{ display:flex; justify-content:space-between; font-size:11px; margin-bottom:6px;}
  .pdfpage .title{ text-align:center; border:1.5px solid #111; padding:6px 10px; font-weight:bold; font-size:19px; margin-bottom:8px; letter-spacing:.02em; }
  .pdfpage .metaline{ margin: 3px 0; }
  .pdfpage .metaline b{ text-decoration: underline; }
  .pdfpage .deroulement{
    text-align:center; font-weight:bold; letter-spacing:.15em; text-decoration:underline;
    margin: 12px 0 6px;
  }
  .pdfpage table{ width:100%; border-collapse:collapse; border:2px solid #111; }
  .pdfpage th{ border:2px solid #111; padding:5px; font-size:11.5px; letter-spacing:.08em; font-style:italic; page-break-inside:avoid; }
  .pdfpage td{ border-left:2px solid #111; border-right:2px solid #111; vertical-align:top; padding:6px 8px; }
  .pdfpage td.td-consignes{ width:75%; }
  .pdfpage td.td-resultats{ width:25%; text-align:center; }
  .pdfpage tr{ page-break-inside: avoid; }
  .pdfpage .sec-title{ font-weight:bold; font-style:italic; text-decoration:underline; text-transform:uppercase; margin-top:8px; display:block; font-size:11.5px;}
  .pdfpage .sub-title{ font-weight:bold; font-style:italic; text-decoration:underline; display:block; margin-top:5px; font-size:11.5px;}
  .pdfpage .body-text{ white-space:pre-wrap; margin: 2px 0 6px; font-size:11.5px; }
  .pdfpage .footerline{ font-size:9px; margin-top:10px; }
</style>
</head>

/*
  Session utilisateur : obtenue en se connectant avec nom + code auprès du
  serveur (fonction Netlify user-login). Le compte (abonnement, expiration,
  quota total) vit côté serveur — seul le compteur de fiches utilisées est
  suivi localement sur cet appareil pour éviter un appel réseau à chaque fiche.
*/
function getSession(){
  try{ return JSON.parse(localStorage.getItem(SESSION_KEY)); }
  catch(e){ return null; }
}
function saveSession(session){
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
}
function clearSession(){
  localStorage.removeItem(SESSION_KEY);
}
function isSessionActive(session){
  return !!session && Date.now() < session.expiryTs && session.quotaUsed < session.quotaTotal;
}
function isPremium(){
  return isSessionActive(getSession());
}
function remainingQuota(session){
  return Math.max(0, session.quotaTotal - session.quotaUsed);
}

function canCreateFiche(){
  const session = getSession();
  if(isSessionActive(session)) return true;
  return remainingFree() > 0;
}
async function recordFicheCreated(){
  const session = getSession();
  if(isSessionActive(session)){
    // Mise à jour optimiste locale immédiate, puis confirmation serveur
    session.quotaUsed += 1;
    saveSession(session);
    try{
      const res = await fetch(`${PAYMENT_API_BASE}/api/record-usage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: session.phone, code: session.code })
      });
      const data = await res.json();
      if(data && data.ok){
        // Recale sur la valeur exacte du serveur (utile en cas d'utilisation multi-appareils)
        const fresh = getSession();
        if(fresh){
          fresh.quotaUsed = data.quotaUsed;
          saveSession(fresh);
        }
      }
    } catch(e){
      // Pas de réseau : la mise à jour locale optimiste reste en place
    }
  } else {
    incFreeUsed();
  }
}

async function loginWithCode(phone, code){
  try{
    const res = await fetch(`${PAYMENT_API_BASE}/api/user-login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, code })
    });
    const data = await res.json();
    if(!res.ok || !data.ok){
      return { ok:false, reason: data.reason || 'invalid' };
    }
    const p = data.profile;
    saveSession({
      phone: p.phone, nom: p.nom, prenom: p.prenom, code: p.code,
      planLabel: p.planLabel, expiryTs: p.expiryTs,
      quotaTotal: p.quotaTotal, quotaUsed: p.quotaUsed || 0,
      promo: p.promo || null, classe: p.classe || null
    });
    return { ok:true, session: getSession() };
  } catch(err){
    return { ok:false, reason:'network' };
  }
}

/* Enregistre la classe (CI-CP / CE1-CM2) choisie à l'abonnement sur le compte,
   dès la première connexion réussie qui suit le paiement (ou l'offre gratuite). */
async function syncClasseToAccount(classeKey){
  const session = getSession();
  if(!session) return false;
  try{
    const res = await fetch(`${PAYMENT_API_BASE}/api/set-classe`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: session.phone, code: session.code, classe: classeKey })
    });
    const data = await res.json();
    if(data && data.ok){
      session.classe = classeKey;
      saveSession(session);
      clearPendingClasse();
      return true;
    }
  } catch(err){ /* pas grave, on réessaiera plus tard */ }
  return false;
}

function matchesFicheSearch(f, term){
  if(!term) return true;
  const t = term.trim().toLowerCase();
  if(!t) return true;
  const matiere = (f.header.matiere||'').toLowerCase();
  const dateStr = new Date(f.exportedAt||f.updatedAt).toLocaleDateString('fr-FR');
  return matiere.includes(t) || dateStr.includes(t);
}

const SUBJECT_COLORS = ['#2557C7','#1D9A6C','#D97706','#7C4FE0'];
function subjectColor(str){
  let h = 0;
  for(let i=0;i<(str||'').length;i++) h = (h*31 + str.charCodeAt(i)) % 997;
  return SUBJECT_COLORS[h % SUBJECT_COLORS.length];
}

  const searchBar = `

async function fetchPromo(){
  try{
    const res = await fetch(`${PAYMENT_API_BASE}/api/promo-status`);
    const data = await res.json();
    if(data && data.promo){
      const changed = JSON.stringify(currentPromo) !== JSON.stringify(data.promo);
      currentPromo = data.promo;
      if(changed && (state.view==='paywall' || state.view==='subscribe')) render();
    }
  } catch(e){ /* pas de réseau, on garde l'état précédent */ }
}

async function claimFreePlan(){
  const p = getProfile();
  if(!selectedClasse){
    alert('Merci de choisir la classe (CI-CP ou CE1-CM2) avant de continuer.');
    return;
  }
  if(!p.nom || !p.prenom || !p.telephone){
    alert('Merci de renseigner ton nom, prénom et numéro de téléphone.');
    return;
  }
  setPendingClasse(selectedClasse);
  const planIndex = PLANS.findIndex(pl => pl.days === selectedPlanDays);
  const btn = document.getElementById('claimFreeBtn');
  if(btn){ btn.textContent = 'Traitement…'; btn.disabled = true; }
  try{
    const res = await fetch(`${PAYMENT_API_BASE}/api/claim-free-plan`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nom: p.nom, prenom: p.prenom, phone: p.telephone, planIndex })
    });
    const data = await res.json();
    if(!res.ok || !data.ok){
      throw new Error(data.error || "Impossible d'obtenir cette offre.");
    }
    alert(`🎁 Ton abonnement gratuit est activé !\n\nCode : ${data.code}\n\nNote-le bien, puis connecte-toi avec ton numéro et ce code.`);
    state = { view:'login' };
    render();
  } catch(err){
    alert(err.message);
    if(btn){ btn.textContent = '🎁 Obtenir gratuitement'; btn.disabled = false; }
  }
}

function getPayAttempts(){
  return parseInt(localStorage.getItem('fpb_pay_attempts') || '0', 10);
}
function incPayAttempts(){
  const n = getPayAttempts() + 1;
  localStorage.setItem('fpb_pay_attempts', String(n));
  return n;
}
function resetPayAttempts(){
  localStorage.removeItem('fpb_pay_attempts');
}

function payAutomatically(){
  const p = getProfile();
  if(!selectedClasse){
    alert('Merci de choisir la classe (CI-CP ou CE1-CM2) avant de payer.');
    return;
  }
  if(!p.nom || !p.prenom || !p.telephone){
    alert('Merci de renseigner ton nom, prénom et numéro de téléphone avant de payer.');
    return;
  }
  const planIndex = PLANS.findIndex(pl => pl.days === selectedPlanDays);
  const link = FEDAPAY_LINKS[planIndex];
  if(!link){
    alert("Lien de paiement indisponible pour cette formule.");
    return;
  }
  setPendingClasse(selectedClasse);
  incPayAttempts();
  window.open(link, '_blank');
  renderSubscribe();
}

    return;

  const plan = PLANS.find(pl => pl.days === selectedPlanDays);
  const msg = `Bonjour, je viens de payer l'abonnement FicheProBot (${plan.label}).\nNom: ${p.nom}\nPrénom: ${p.prenom}\nTéléphone: ${p.telephone}\nJoins ma capture de paiement ci-dessous.`;
  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;

}

async function tryLogin(){
  const phoneInput = document.getElementById('loginPhone');
  const codeInput = document.getElementById('codeInput');
  const btn = document.getElementById('loginBtn');
  const msg = document.getElementById('codeMsg');
  if(!phoneInput.value.trim() || !codeInput.value.trim()){
    msg.style.color = 'var(--danger)';
    msg.textContent = 'Entre ton numéro de téléphone et ton code.';
    return;
  }
  btn.textContent = 'Connexion…';
  btn.disabled = true;
  const result = await loginWithCode(phoneInput.value, codeInput.value);
  btn.textContent = 'Se connecter';
  btn.disabled = false;
  if(result.ok){
    resetPayAttempts();
    const pending = getPendingClasse();
    if(pending && result.session.classe !== pending){
      await syncClasseToAccount(pending);
    }
    msg.style.color = 'var(--ok)';
    const d = new Date(result.session.expiryTs).toLocaleDateString('fr-FR');
    msg.textContent = `Connecté ✓ Accès actif jusqu'au ${d} (${result.session.planLabel})`;
    setTimeout(()=>{ state = { view:'list' }; render(); }, 1000);
  } else {
    msg.style.color = 'var(--danger)';
    msg.textContent = result.reason === 'expired' ? "Cet abonnement a expiré."
      : result.reason === 'inactive' ? "Ce compte a été désactivé. Contacte-nous."
      : result.reason === 'network' ? "Impossible de contacter le serveur, réessaie."
      : "Numéro ou code incorrect.";
  }
}

async function createFicheForSubject(subjectKey){
  const f = blankFiche(subjectKey);
  fiches.push(f);
  saveFiches(fiches);
  await recordFicheCreated();
  state = { view:'form', ficheId:f.id };
  render();
}

function openFiche(id){
  state = { view:'form', ficheId:id };
  render();
}

function deleteFiche(id){
  if(!confirm('Supprimer définitivement cette fiche ?')) return;
  fiches = fiches.filter(f=>f.id!==id);
  saveFiches(fiches);
  render();
}

const HEADER_FIELDS = [
  ['fn','Fiche N°'], ['cours','Cours (classe)'],
  ['saNumero','SA N°'], ['seanceNumero','Séance N°'], ['duree','Durée'],
  ['enseignant','Nom et prénom (enseignant·e)'],
  ['theme','Unité'], ['dossier','Dossier'],
  ['titre','Titre de la séance', true],
  ['competenceDisciplinaire','Compétence disciplinaire', true],
  ['competencesTvCtd','Compétences TV-CTD', true],
  ['connaissancesTechniques','Connaissances et techniques', true],
  ['strategies',"Stratégies d'enseignement / apprentissage / évaluation", true],
  ['materiel','Matériel', true]
];

function renderForm(){
  const f = findFiche(state.ficheId);
  if(!f){ state.view='list'; render(); return; }
  if(!f.subjectKey || !SUBJECTS[f.subjectKey]) f.subjectKey = 'esCivisme';

  const nameLocked = isPremium();
  const headerHtml = HEADER_FIELDS.map(([key,label,full])=>{
    const readOnly = f.locked || (key==='enseignant' && nameLocked);
    return `
    <div class="field ${full?'full':''}">
      <label>${label}${key==='enseignant' && nameLocked ? ' 🔒' : ''}</label>
      ${full
        ? `<textarea data-key="${key}" ${readOnly?'readonly':''} oninput="updateHeader('${key}',this.value)">${escapeHtml(f.header[key])}</textarea>`
        : `<input data-key="${key}" ${readOnly?'readonly':''} value="${escapeHtml(f.header[key])}" oninput="updateHeader('${key}',this.value)">`
      }
    </div>
  `;}).join('');

  const phasesHtml = f.phases.map((p,pi)=>`
    <div class="phase">
      <h2>${escapeHtml(p.phase)}</h2>
      ${p.items.map((it,ii)=>`
        <div class="subsection">
          ${it.label ? `<div class="label">${escapeHtml(it.label)}</div>` : ''}
          <div class="cols">
            <div class="col">
              <div class="colhead">Consignes</div>
              <textarea ${f.locked?'readonly':''} oninput="updateItem(${pi},${ii},'consignes',this.value)">${escapeHtml(it.consignes)}</textarea>
            </div>
            <div class="col">
              <div class="colhead">Résultats attendus</div>
              <textarea ${f.locked?'readonly':''} oninput="updateItem(${pi},${ii},'resultats',this.value)">${escapeHtml(it.resultats)}</textarea>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');

  document.getElementById('viewport').innerHTML = `
    <div class="topbar" style="justify-content:flex-end;">
      <div class="actions">
        <span class="savedmsg" id="savedmsg"></span>
        <button class="pdf" onclick="exportPdf('${f.id}')">${f.locked ? 'Télécharger à nouveau le PDF' : 'Exporter en PDF'}</button>
      </div>
    </div>
    ${f.locked ? `<div style="background:#FBEAEA; border:1.5px solid var(--danger); color:var(--danger); padding:12px 14px; border-radius:8px; font-size:13px; margin-bottom:16px;">🔒 Cette fiche a été convertie en PDF — elle n'est plus modifiable. Tu peux seulement retélécharger le PDF ou consulter le contenu ci-dessous.</div>` : ''}
    <div class="masthead" style="border-bottom:none; padding-bottom:0; margin-bottom:16px;">
      <span class="matiere" style="font-size:13px;">${escapeHtml(SUBJECTS[f.subjectKey].label)}</span>
    </div>
    <div class="panel">
      <h2>En-tête</h2>
      <div class="fieldgrid">${headerHtml}</div>
    </div>
    ${phasesHtml}
  `;
}

function backToList(){ state.view='list'; render(); }

function updateHeader(key, value){
  const f = findFiche(state.ficheId);
  if(f.locked) return;
  if(key==='enseignant' && isPremium()) return;
  f.header[key] = value;
  f.updatedAt = Date.now();
  saveFiches(fiches);
  flashSaved();
}
function updateItem(pi, ii, field, value){
  const f = findFiche(state.ficheId);
  if(f.locked) return;
  f.phases[pi].items[ii][field] = value;
  f.updatedAt = Date.now();
  saveFiches(fiches);
  flashSaved();
}
let saveFlashTimer;
function flashSaved(){
  const el = document.getElementById('savedmsg');
  if(!el) return;
  el.textContent = 'Enregistré ✓';
  clearTimeout(saveFlashTimer);
  saveFlashTimer = setTimeout(()=>{ if(el) el.textContent=''; }, 1400);
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatDateFR(d){
  const jours = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const mois = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  return `${jours[d.getDay()]} ${d.getDate()} ${mois[d.getMonth()]} ${d.getFullYear()}`;
}

/* ---------- PDF export ---------- */
function exportPdf(id){
  const btn = event ? event.target : null;
  const originalLabel = btn ? btn.textContent : null;
  if(typeof html2pdf === 'undefined'){
    alert("La bibliothèque PDF n'a pas pu se charger (pas de connexion, ou aperçu en bac à sable).\n\nOuvre le fichier .html directement dans un onglet de ton navigateur (double-clique dessus après téléchargement) plutôt que dans l'aperçu du chat, puis réessaie.");
    return;
  }
  const f = findFiche(id);
  const root = document.getElementById('pdf-root');
  root.innerHTML = buildPdfHtml(f);
  const opt = {
    margin: [14, 8, 20, 8],
    filename: `${(f.header.titre||'fiche').replace(/[^\w\-]+/g,'_')}.pdf`,
    image: { type:'jpeg', quality:0.92 },
    html2canvas: { scale:2.3, useCORS:true, letterRendering:true },
    jsPDF: { unit:'mm', format:'a4', orientation:'portrait', compress:true },
    pagebreak: { mode: ['css'] }
  };
  if(btn){ btn.textContent = 'Génération…'; btn.disabled = true; }
  html2pdf().set(opt).from(root.querySelector('.pdfpage')).outputPdf('blob')
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = opt.filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 4000);
      const openTab = window.open(url, '_blank');
      if(!openTab){
        /* popup blocked — download link above still covers it */
      }
      moveToHistory(f);
      render();
    })
    .catch(err => {
      alert("La génération du PDF a échoué : " + (err && err.message ? err.message : err) + "\n\nEssaie d'ouvrir ce fichier .html directement dans un onglet de navigateur plutôt que dans l'aperçu du chat.");
    })
    .finally(() => {
      if(btn){ btn.textContent = originalLabel; btn.disabled = false; }
    });
}

function buildPdfHtml(f){
  const h = f.header;
  const rows = f.phases.map(p => `
    <tr><th colspan="2" style="text-align:center; padding-top:10px;">${escapeHtml(p.phase).toUpperCase()}</th></tr>
    ${p.items.map(it => `
      <tr>
        <td class="td-consignes">${it.label ? `<span class="sub-title">${escapeHtml(it.label)}</span>` : ''}<div class="body-text"${it.label==='Résumé' ? ' style="font-style:italic; font-weight:bold;"' : ''}>${escapeHtml(it.consignes)||'—'}</div></td>
        <td class="td-resultats"><div class="body-text"${it.label==='Résumé' ? ' style="font-style:italic; font-weight:bold;"' : ''}>${escapeHtml(it.resultats)||'—'}</div></td>
      </tr>
    `).join('')}
  `).join('');

  return `
  <div class="pdfpage">
    <div class="frame">
      <div class="toprow">
        <span><b>Fiche N°</b> ${escapeHtml(h.fn)}</span>
        <span><b>COURS:</b> ${escapeHtml(h.cours)}</span>
      </div>
      <div class="title">FICHE DE PRÉPARATION DE ${escapeHtml(h.matiere).toUpperCase() || 'LA MATIÈRE'}</div>
      <div class="metaline" style="text-align:right; font-size:10px; font-style:italic;">Fiche élaborée le ${escapeHtml(formatDateFR(new Date()))}</div>
      <div class="metaline" style="text-align:right; font-size:10.5px;"><b>Par:</b> ${escapeHtml(h.enseignant) || '—'}</div>
      <div class="metaline">
        <span style="display:inline-block; margin-right:26px;"><b>UNITÉ:</b> ${escapeHtml(h.theme)}</span>
        <span style="display:inline-block;"><b>DOSSIER:</b> ${escapeHtml(h.dossier)}</span>
      </div>
      <div class="metaline">
        <span style="display:inline-block; margin-right:26px;"><b>SA N°</b> ${escapeHtml(h.saNumero)}</span>
        <span style="display:inline-block; margin-right:26px;"><b>Séance N°</b> ${escapeHtml(h.seanceNumero)}</span>
        <span style="display:inline-block;"><b>Durée:</b> ${escapeHtml(h.duree)}</span>
      </div>
      <div class="metaline"><b>Titre:</b> ${escapeHtml(h.titre)}</div>
      <div class="metaline"><b>Compétence disciplinaire:</b> ${escapeHtml(h.competenceDisciplinaire)}</div>
      <div class="metaline"><b>Compétences TV-CTD:</b> ${escapeHtml(h.competencesTvCtd)}</div>
      <div class="metaline"><b>Connaissances et techniques:</b> ${escapeHtml(h.connaissancesTechniques)}</div>
      <div class="metaline"><b>Stratégies d'Ens/App/Eval:</b> ${escapeHtml(h.strategies)}</div>
      <div class="metaline"><b>Matériel:</b> ${escapeHtml(h.materiel)}</div>

      <div class="deroulement">DÉROULEMENT</div>
      <table>
        <tr><th>CONSIGNES</th><th>RÉSULTATS ATTENDUS</th></tr>
        ${rows}
      </table>
      <div class="metaline" style="margin-top:10px;"><b>Note personnelle :</b></div>
      <div style="border-bottom:1px solid #999; height:22px;"></div>
      <div style="border-bottom:1px solid #999; height:22px;"></div>
      <div class="footerline">Réalisée via FicheProBot</div>
    </div>
  </div>`;
}

render();
fetchPromo();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {});
  });
}

let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById('installAppBtn');
  if (btn) btn.style.display = 'inline-flex';
});
async function installApp() {
  if (!deferredInstallPrompt) {
    alert("Sur iPhone : appuie sur le bouton Partager de Safari, puis \"Sur l'écran d'accueil\".\n\nSur Android : si le bouton n'apparaît pas, ouvre le menu ⋮ de Chrome puis \"Installer l'application\".");
    return;
  }
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  const btn = document.getElementById('installAppBtn');
  if (btn) btn.style.display = 'none';
}
</script>
